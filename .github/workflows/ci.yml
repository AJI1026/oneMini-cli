name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Check embedded signing public key
        run: |
          chmod +x scripts/check-embedded-pubkey.sh
          ./scripts/check-embedded-pubkey.sh

      - name: Verify signed versions.json
        run: |
          python3 scripts/verify_signature.py \
            --file release/versions.json \
            --sig release/versions.json.sig \
            --pubkey release/signing_public_key.b64

      - name: Cargo test
        run: cargo test --locked
