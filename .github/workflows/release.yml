name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: onemini

jobs:
  build:
    name: build (${{ matrix.pack }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            pack: mac-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pack: linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pack: win-x64

    steps:
      - uses: actions/checkout@v5

      - name: Ensure brand icons
        shell: bash
        run: |
          if [[ ! -f assets/onemini.ico || ! -f assets/AppIcon.icns ]]; then
            chmod +x scripts/generate-brand-icons.sh
            ./scripts/generate-brand-icons.sh
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tar.gz (macOS / Linux)
        if: matrix.pack != 'win-x64'
        run: |
          ARCHIVE="${BINARY_NAME}-${{ matrix.pack }}.tar.gz"
          BUNDLE="bundle-${{ matrix.pack }}"
          mkdir -p "$BUNDLE"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$BUNDLE/"
          cp -R skills "$BUNDLE/"
          tar czf "$ARCHIVE" -C "$BUNDLE" .
          rm -rf "$BUNDLE"

      - name: Package app bundle zip (macOS)
        if: matrix.pack == 'mac-arm64'
        run: |
          VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          APP="OneMini.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/${BINARY_NAME}"
          cp -R skills "$APP/Contents/Resources/"
          if [[ -f assets/AppIcon.icns ]]; then
            cp assets/AppIcon.icns "$APP/Contents/Resources/"
          fi
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>${BINARY_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.onemini.cli</string>
            <key>CFBundleName</key>
            <string>OneMini</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          BUNDLE_ZIP="${BINARY_NAME}-${{ matrix.pack }}-bundle.zip"
          zip -r "$BUNDLE_ZIP" "$APP"
          rm -rf "$APP"

      - name: Package zip (Windows)
        if: matrix.pack == 'win-x64'
        shell: pwsh
        run: |
          $archive = "${{ env.BINARY_NAME }}-${{ matrix.pack }}.zip"
          $packDir = "pack-windows-${{ matrix.pack }}"
          New-Item -ItemType Directory -Path $packDir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$packDir/"
          Copy-Item -Recurse "skills" "$packDir/"
          $archiveAbs = (Resolve-Path ".").Path + "\$archive"
          Push-Location $packDir
          try {
            Compress-Archive -Path @(
              "$($env:BINARY_NAME).exe",
              "skills"
            ) -DestinationPath $archiveAbs -Force
          } finally {
            Pop-Location
          }
          Remove-Item -Recurse -Force $packDir

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.pack }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.pack }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Sign artifacts and versions.json
        env:
          ONEMINI_SIGNING_KEY: ${{ secrets.ONEMINI_SIGNING_KEY }}
        run: |
          chmod +x scripts/sign-release.sh
          if [[ -z "${ONEMINI_SIGNING_KEY}" ]]; then
            echo "::error::ONEMINI_SIGNING_KEY secret is required for signed releases"
            exit 1
          fi
          ./scripts/sign-release.sh dist "${{ github.ref_name }}"

      - name: Copy signed index to dist
        run: |
          cp release/versions.json dist/versions.json
          cp release/versions.json.sig dist/versions.json.sig

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Commit signed versions.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/versions.json release/versions.json.sig
          git diff --staged --quiet || git commit -m "chore(release): update signed versions.json for ${{ github.ref_name }}"
          git push origin HEAD:main
