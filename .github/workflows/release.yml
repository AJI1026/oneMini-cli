name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: onemini

jobs:
  build:
    name: build (${{ matrix.pack }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            pack: mac-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pack: linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pack: win-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tar.gz (macOS / Linux)
        if: matrix.pack != 'win-x64'
        run: |
          ARCHIVE="${BINARY_NAME}-${{ matrix.pack }}.tar.gz"
          BUNDLE="bundle-${{ matrix.pack }}"
          mkdir -p "$BUNDLE"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$BUNDLE/"
          cp -R skills "$BUNDLE/"
          tar czf "$ARCHIVE" -C "$BUNDLE" .
          rm -rf "$BUNDLE"

      - name: Package DMG (macOS)
        if: matrix.pack == 'mac-arm64'
        run: |
          PACK="pack-dmg-${{ matrix.pack }}"
          mkdir -p "$PACK"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$PACK/"
          cp -R skills "$PACK/"
          cp scripts/install-local.sh "$PACK/"
          chmod +x "$PACK/install-local.sh" "$PACK/${BINARY_NAME}"
          cat > "$PACK/README.txt" <<'EOF'
          OneMini CLI

          1. 打开终端，进入此卷内的文件夹
          2. 运行: ./install-local.sh
             或: ./onemini install
          EOF
          DMG="${BINARY_NAME}-${{ matrix.pack }}.dmg"
          hdiutil create -volname "OneMini CLI" -srcfolder "$PACK" -ov -format UDZO "$DMG"
          rm -rf "$PACK"

      - name: Package zip (Windows)
        if: matrix.pack == 'win-x64'
        shell: pwsh
        run: |
          $archive = "${{ env.BINARY_NAME }}-${{ matrix.pack }}.zip"
          $packDir = "pack-windows-${{ matrix.pack }}"
          New-Item -ItemType Directory -Path $packDir -Force | Out-Null
          New-Item -ItemType Directory -Path "$packDir/lib" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$packDir/"
          Copy-Item -Recurse "skills" "$packDir/"
          Copy-Item "scripts/install-local.ps1" "$packDir/"
          Copy-Item "scripts/install-local.bat" "$packDir/"
          Copy-Item "scripts/lib/windows-path.ps1" "$packDir/lib/"
          $archiveAbs = (Resolve-Path ".").Path + "\$archive"
          Push-Location $packDir
          try {
            Compress-Archive -Path @(
              "$($env:BINARY_NAME).exe",
              "skills",
              "install-local.ps1",
              "install-local.bat",
              "lib\windows-path.ps1"
            ) -DestinationPath $archiveAbs -Force
          } finally {
            Pop-Location
          }
          Remove-Item -Recurse -Force $packDir

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.pack }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.pack }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Sign artifacts and versions.json
        env:
          ONEMINI_SIGNING_KEY: ${{ secrets.ONEMINI_SIGNING_KEY }}
        run: |
          chmod +x scripts/sign-release.sh
          if [[ -z "${ONEMINI_SIGNING_KEY}" ]]; then
            echo "::error::ONEMINI_SIGNING_KEY secret is required for signed releases"
            exit 1
          fi
          ./scripts/sign-release.sh dist "${{ github.ref_name }}"

      - name: Copy signed index to dist
        run: |
          cp release/versions.json dist/versions.json
          cp release/versions.json.sig dist/versions.json.sig

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Commit signed versions.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/versions.json release/versions.json.sig
          git diff --staged --quiet || git commit -m "chore(release): update signed versions.json for ${{ github.ref_name }}"
          git push origin HEAD:main
